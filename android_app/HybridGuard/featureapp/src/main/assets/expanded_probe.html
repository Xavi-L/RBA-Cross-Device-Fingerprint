<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HybridGuard Expanded Probe</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --panel: #ffffff;
            --text: #101828;
            --muted: #667085;
            --accent: #1a73e8;
            --good: #12805c;
            --bad: #c5221f;
            --border: #d0d5dd;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: max(56px, calc(env(safe-area-inset-top) + 28px)) 18px 28px;
            color: var(--text);
            background: var(--bg);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .pulse {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 0 rgba(26, 115, 232, 0.35);
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            to { box-shadow: 0 0 0 12px rgba(26, 115, 232, 0); }
        }

        h1 {
            margin: 0;
            font-size: 17px;
            line-height: 1.25;
        }

        .sub {
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .status {
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
        }

        .canvas-box {
            display: none;
            margin-top: 12px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
        }

        .log {
            height: 320px;
            overflow-y: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 12px;
            line-height: 1.55;
        }

        .line {
            margin: 0 0 7px;
            color: var(--text);
        }

        .line.good { color: var(--good); }
        .line.bad { color: var(--bad); }
    </style>
</head>
<body>
<div class="header">
    <div class="pulse"></div>
    <div>
        <h1>Expanded Feature Probe</h1>
        <div id="subtitle" class="sub">Collecting raw signals for offline grouped-fusion experiments.</div>
    </div>
</div>

<div class="panel">
    <div id="status" class="status">Starting expanded probe...</div>
    <div id="canvasBox" class="canvas-box"></div>
</div>

<div class="panel log" id="log"></div>

<script>
    var statusEl = document.getElementById("status");
    var subtitleEl = document.getElementById("subtitle");
    var logEl = document.getElementById("log");
    var canvasBox = document.getElementById("canvasBox");
    var probeStatuses = {};

    function setStatus(text) {
        statusEl.textContent = text;
    }

    function log(text, cls) {
        var p = document.createElement("p");
        p.className = "line" + (cls ? " " + cls : "");
        p.textContent = text;
        logEl.appendChild(p);
        logEl.scrollTop = logEl.scrollHeight;
    }

    window.HybridGuardProbe = {
        updateResult: function (status, detail, cls) {
            setStatus(status);
            if (detail) {
                subtitleEl.textContent = detail;
                log(detail, cls);
            }
        }
    };

    function sleep(ms) {
        return new Promise(function (resolve) {
            setTimeout(resolve, ms);
        });
    }

    function probeKey(name) {
        return String(name || "unknown").toLowerCase().replace(/\s+/g, "_");
    }

    function arrayFrom(value) {
        return Array.prototype.slice.call(value || []);
    }

    function isFiniteNumber(value) {
        return typeof value === "number" && isFinite(value);
    }

    function assignObject(target, source) {
        Object.keys(source || {}).forEach(function (key) {
            target[key] = source[key];
        });
        return target;
    }

    function storageAvailable(type) {
        try {
            var storage = window[type];
            var key = "__hybridguard_probe__";
            storage.setItem(key, key);
            storage.removeItem(key);
            return true;
        } catch (e) {
            return false;
        }
    }

    function describeError(error) {
        var name = error && error.name ? error.name : "Error";
        var message = error && error.message ? ": " + error.message : "";
        return name + message;
    }

    function safeSyncProbe(name, probe, fallbackFactory) {
        try {
            var result = probe();
            probeStatuses[probeKey(name)] = "observed";
            return result;
        } catch (e) {
            probeStatuses[probeKey(name)] = "runtime_error";
            log(name + " probe degraded: " + describeError(e), "bad");
            return fallbackFactory();
        }
    }

    function safeAsyncProbe(name, probe, fallbackFactory, timeoutMs) {
        var timeoutId;
        var timeout = new Promise(function (_, reject) {
            timeoutId = setTimeout(function () {
                reject(new Error(name + " timeout"));
            }, timeoutMs);
        });
        return Promise.race([Promise.resolve().then(probe), timeout]).then(function (value) {
            clearTimeout(timeoutId);
            probeStatuses[probeKey(name)] = "observed";
            return value;
        }, function (error) {
            clearTimeout(timeoutId);
            probeStatuses[probeKey(name)] = /timeout/i.test(describeError(error)) ? "timeout" : "runtime_error";
            log(name + " probe degraded: " + describeError(error), "bad");
            return fallbackFactory();
        });
    }

    function defaultHostData() {
        return {
            webview_provider_package: "",
            webview_provider_version: "",
            webview_provider_version_code: -1,
            webview_provider_major: -1,
            system_http_agent: "",
            default_ua_native: "",
            is_debuggable: false,
            app_package_name: "",
            app_version_name: "",
            app_version_code: -1,
            installer_package: "unknown",
            is_cleartext_traffic_permitted: false,
            first_install_time: -1,
            last_update_time: -1,
            target_sdk_version: -1,
            min_sdk_version: -1,
            java_script_enabled: true,
            dom_storage_enabled: true,
            database_enabled: false,
            allow_file_access: false,
            allow_content_access: false,
            mixed_content_mode: -1,
            safe_browsing_enabled: false,
            settings_user_agent: ""
        };
    }

    function defaultWebGLInfo() {
        return {
            vendor: "Unknown",
            renderer: "Unknown",
            webgl2_supported: false,
            webgl_extensions_count: 0,
            max_texture_size: -1,
            max_viewport_dims: "",
            aliased_line_width_range: ""
        };
    }

    function defaultNavigatorFeatures() {
        return {
            user_agent: "",
            language: "",
            languages: [],
            platform: "",
            vendor: "",
            product: "",
            product_sub: "",
            hardware_concurrency: 0,
            device_memory: 0,
            max_touch_points: 0,
            cookie_enabled: false,
            do_not_track: "",
            online: false
        };
    }

    function defaultScreenFeatures() {
        return {
            screen_resolution_logical: "",
            device_pixel_ratio: -1,
            color_depth: -1,
            pixel_depth: -1,
            avail_width: -1,
            avail_height: -1,
            inner_width: -1,
            inner_height: -1,
            outer_width: -1,
            outer_height: -1,
            visual_viewport_width: -1,
            visual_viewport_height: -1,
            visual_viewport_scale: -1,
            orientation_type: "",
            orientation_angle: -1
        };
    }

    function defaultExecutionFeatures() {
        return {
            compute_task_time_ms: -1,
            timezone_offset: 0,
            timezone_id: "",
            performance_time_origin: 0,
            local_storage_available: false,
            session_storage_available: false
        };
    }

    function defaultConnectionFeatures() {
        return { effective_type: "", downlink_mbps: -1, rtt_ms: -1, save_data: false };
    }

    function defaultAudioFeatures() {
        return {
            audio_context_supported: false,
            audio_sample_rate: -1,
            audio_output_latency: -1,
            audio_hash: "",
            audio_error: ""
        };
    }

    function defaultFontFeatures() {
        return { font_probe_count: 0, available_font_hash: "", font_probe_error: "" };
    }

    function defaultPermissionsFeatures() {
        return {
            permissions_api_supported: false,
            notification_permission_state: "unsupported",
            geolocation_permission_state: "unsupported",
            camera_permission_state: "unsupported",
            microphone_permission_state: "unsupported",
            clipboard_read_state: "unsupported",
            permission_query_errors: []
        };
    }

    function defaultAutomationFeatures() {
        return {
            webdriver: false,
            plugins_count: 0,
            mime_types_count: 0,
            plugins_hash: "",
            mime_types_hash: "",
            plugin_probe_error: ""
        };
    }

    function hashProbeValues(values) {
        var text = Array.isArray(values) ? values.join("|") : String(values || "");
        if (!text) {
            return "";
        }
        if (window.AndroidBridge && window.AndroidBridge.sha256) {
            return window.AndroidBridge.sha256(text);
        }

        var hash = 2166136261;
        for (var i = 0; i < text.length; i++) {
            hash ^= text.charCodeAt(i);
            hash = Math.imul(hash, 16777619);
        }
        return ("00000000" + (hash >>> 0).toString(16)).slice(-8);
    }

    function quoteCssFontName(fontName) {
        return "\"" + String(fontName).replace(/\\/g, "\\\\").replace(/"/g, "\\\"") + "\"";
    }

    function getWebGLInfo() {
        var canvas = document.createElement("canvas");
        var gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
        var gl2 = canvas.getContext("webgl2");
        var info = defaultWebGLInfo();
        info.webgl2_supported = !!gl2;
        if (gl) {
            var debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
            if (debugInfo) {
                info.vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                info.renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
            }
            var extensions = gl.getSupportedExtensions();
            info.webgl_extensions_count = extensions ? extensions.length : 0;
            info.max_texture_size = gl.getParameter(gl.MAX_TEXTURE_SIZE) || -1;
            info.max_viewport_dims = arrayFrom(gl.getParameter(gl.MAX_VIEWPORT_DIMS) || []).join("x");
            info.aliased_line_width_range = arrayFrom(gl.getParameter(gl.ALIASED_LINE_WIDTH_RANGE) || []).join("-");
        }
        return info;
    }

    function getNavigatorFeatures() {
        var nav = navigator;
        return {
            user_agent: nav.userAgent,
            language: nav.language || "",
            languages: arrayFrom(nav.languages || []),
            platform: nav.platform || "",
            vendor: nav.vendor || "",
            product: nav.product || "",
            product_sub: nav.productSub || "",
            hardware_concurrency: nav.hardwareConcurrency || 0,
            device_memory: nav.deviceMemory || 0,
            max_touch_points: nav.maxTouchPoints || 0,
            cookie_enabled: !!nav.cookieEnabled,
            do_not_track: nav.doNotTrack || "",
            online: !!nav.onLine
        };
    }

    function getScreenFeatures() {
        var vv = window.visualViewport;
        var orientation = screen.orientation || {};
        return {
            screen_resolution_logical: window.screen.width + "x" + window.screen.height,
            device_pixel_ratio: window.devicePixelRatio || 1,
            color_depth: screen.colorDepth || 0,
            pixel_depth: screen.pixelDepth || 0,
            avail_width: screen.availWidth || 0,
            avail_height: screen.availHeight || 0,
            inner_width: window.innerWidth || 0,
            inner_height: window.innerHeight || 0,
            outer_width: window.outerWidth || 0,
            outer_height: window.outerHeight || 0,
            visual_viewport_width: vv ? vv.width : -1,
            visual_viewport_height: vv ? vv.height : -1,
            visual_viewport_scale: vv ? vv.scale : -1,
            orientation_type: orientation.type || "",
            orientation_angle: isFiniteNumber(orientation.angle) ? orientation.angle : -1
        };
    }

    function getExecutionFeatures() {
        var timeZone = (Intl.DateTimeFormat().resolvedOptions() || {}).timeZone || "";
        return {
            compute_task_time_ms: runComputeChallenge().time_ms,
            timezone_offset: new Date().getTimezoneOffset(),
            timezone_id: timeZone,
            performance_time_origin: performance.timeOrigin || 0,
            local_storage_available: storageAvailable("localStorage"),
            session_storage_available: storageAvailable("sessionStorage")
        };
    }

    function getConnectionFeatures() {
        var connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection || {};
        return {
            effective_type: connection.effectiveType || "",
            downlink_mbps: isFiniteNumber(connection.downlink) ? connection.downlink : -1,
            rtt_ms: isFiniteNumber(connection.rtt) ? connection.rtt : -1,
            save_data: !!connection.saveData
        };
    }

    function getAudioFeatures() {
        var AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        var OfflineAudioContextCtor = window.OfflineAudioContext || window.webkitOfflineAudioContext;
        var result = {
            audio_context_supported: !!(AudioContextCtor || OfflineAudioContextCtor),
            audio_sample_rate: -1,
            audio_output_latency: -1,
            audio_hash: "",
            audio_error: ""
        };
        var errors = [];

        if (AudioContextCtor) {
            try {
                var audioContext = new AudioContextCtor();
                result.audio_sample_rate = isFiniteNumber(audioContext.sampleRate) ? audioContext.sampleRate : -1;
                if (isFiniteNumber(audioContext.outputLatency)) {
                    result.audio_output_latency = audioContext.outputLatency;
                } else if (isFiniteNumber(audioContext.baseLatency)) {
                    result.audio_output_latency = audioContext.baseLatency;
                }
                if (audioContext.close) {
                    audioContext.close().catch(function () {});
                }
            } catch (e) {
                errors.push("context:" + describeError(e));
            }
        }

        var renderPromise = Promise.resolve();
        if (OfflineAudioContextCtor) {
            try {
                var sampleRate = result.audio_sample_rate > 0 ? Math.round(result.audio_sample_rate) : 44100;
                var offlineContext = new OfflineAudioContextCtor(1, 4096, sampleRate);
                var oscillator = offlineContext.createOscillator();
                var compressor = offlineContext.createDynamicsCompressor();

                oscillator.type = "triangle";
                oscillator.frequency.value = 10000;
                compressor.threshold.value = -50;
                compressor.knee.value = 40;
                compressor.ratio.value = 12;
                compressor.attack.value = 0;
                compressor.release.value = 0.25;

                oscillator.connect(compressor);
                compressor.connect(offlineContext.destination);
                oscillator.start(0);

                renderPromise = Promise.resolve(offlineContext.startRendering()).then(function (renderedBuffer) {
                    var channelData = renderedBuffer.getChannelData(0);
                    var samples = [];
                    for (var i = 0; i < channelData.length; i += 128) {
                        samples.push(channelData[i].toFixed(8));
                    }
                    result.audio_hash = hashProbeValues(samples);
                }, function (error) {
                    errors.push("offline:" + describeError(error));
                });
            } catch (e) {
                errors.push("offline:" + describeError(e));
            }
        } else {
            errors.push("offline:unavailable");
        }

        return renderPromise.then(function () {
            result.audio_error = errors.join("; ");
            return result;
        });
    }

    function getFontFeatures() {
        var result = {
            font_probe_count: 0,
            available_font_hash: "",
            font_probe_error: ""
        };
        try {
            var canvas = document.createElement("canvas");
            var ctx = canvas.getContext("2d");
            if (!ctx) {
                throw new Error("canvas_2d_unavailable");
            }

            var baseFonts = ["monospace", "sans-serif", "serif"];
            var testText = "mmmmmmmmmmlliMW@#12345";
            var testSize = "72px";
            var baseWidths = {};
            baseFonts.forEach(function (baseFont) {
                ctx.font = testSize + " " + baseFont;
                baseWidths[baseFont] = ctx.measureText(testText).width;
            });

            var candidateFonts = [
                "Arial",
                "Arial Black",
                "Courier New",
                "Droid Sans",
                "Droid Serif",
                "Droid Sans Mono",
                "Roboto",
                "Roboto Condensed",
                "Noto Sans",
                "Noto Serif",
                "Noto Color Emoji",
                "Noto Sans CJK SC",
                "Noto Sans CJK TC",
                "Noto Sans CJK JP",
                "SamsungOne",
                "MiSans",
                "HarmonyOS Sans",
                "Oppo Sans",
                "Source Han Sans",
                "sans-serif-light",
                "sans-serif-medium",
                "serif-monospace"
            ];
            var detectedFonts = candidateFonts.filter(function (fontName) {
                return baseFonts.some(function (baseFont) {
                    ctx.font = testSize + " " + quoteCssFontName(fontName) + ", " + baseFont;
                    var width = ctx.measureText(testText).width;
                    return Math.abs(width - baseWidths[baseFont]) > 0.01;
                });
            }).sort();

            result.font_probe_count = detectedFonts.length;
            result.available_font_hash = hashProbeValues(detectedFonts);
        } catch (e) {
            result.font_probe_error = describeError(e);
        }
        return result;
    }

    function getPermissionsFeatures() {
        var result = {
            permissions_api_supported: !!(navigator.permissions && navigator.permissions.query),
            notification_permission_state: typeof Notification !== "undefined" ? Notification.permission : "unsupported",
            geolocation_permission_state: "unsupported",
            camera_permission_state: "unsupported",
            microphone_permission_state: "unsupported",
            clipboard_read_state: "unsupported",
            permission_query_errors: []
        };

        if (!result.permissions_api_supported) {
            return Promise.resolve(result);
        }

        var queries = [
            ["notifications", "notification_permission_state"],
            ["geolocation", "geolocation_permission_state"],
            ["camera", "camera_permission_state"],
            ["microphone", "microphone_permission_state"],
            ["clipboard-read", "clipboard_read_state"]
        ];

        return Promise.all(queries.map(function (query) {
            var name = query[0];
            var field = query[1];
            return Promise.resolve(navigator.permissions.query({ name: name })).then(function (status) {
                result[field] = status && status.state ? status.state : "unknown";
            }, function (error) {
                result.permission_query_errors.push(name + ":" + describeError(error));
            });
        })).then(function () {
            result.permission_query_errors.sort();
            return result;
        });
    }

    function getAutomationFeatures() {
        var result = {
            webdriver: navigator.webdriver === true,
            plugins_count: navigator.plugins ? navigator.plugins.length : 0,
            mime_types_count: navigator.mimeTypes ? navigator.mimeTypes.length : 0,
            plugins_hash: "",
            mime_types_hash: "",
            plugin_probe_error: ""
        };

        try {
            var pluginSummaries = arrayFrom(navigator.plugins || []).map(function (plugin) {
                var pluginMimeTypes = [];
                for (var i = 0; i < plugin.length; i++) {
                    var mime = plugin[i];
                    pluginMimeTypes.push([mime.type || "", mime.suffixes || ""].join(":"));
                }
                return [
                    plugin.name || "",
                    plugin.filename || "",
                    plugin.description || "",
                    pluginMimeTypes.sort().join(",")
                ].join("~");
            }).sort();
            var mimeTypeSummaries = arrayFrom(navigator.mimeTypes || []).map(function (mime) {
                var pluginName = mime.enabledPlugin ? mime.enabledPlugin.name : "";
                return [
                    mime.type || "",
                    mime.suffixes || "",
                    mime.description || "",
                    pluginName || ""
                ].join("~");
            }).sort();

            result.plugins_hash = hashProbeValues(pluginSummaries);
            result.mime_types_hash = hashProbeValues(mimeTypeSummaries);
        } catch (e) {
            result.plugin_probe_error = describeError(e);
        }

        return {
            webdriver: result.webdriver,
            plugins_count: result.plugins_count,
            mime_types_count: result.mime_types_count,
            plugins_hash: result.plugins_hash,
            mime_types_hash: result.mime_types_hash,
            plugin_probe_error: result.plugin_probe_error
        };
    }

    function runComputeChallenge() {
        var startTime = performance.now();
        var result = 0;
        for (var i = 0; i < 5000000; i++) {
            result += Math.sin(i) * Math.cos(i) + Math.tan(i % 100);
        }
        return { time_ms: parseFloat((performance.now() - startTime).toFixed(2)), guard: result };
    }

    function getCanvasFingerprint() {
        var canvas = document.createElement("canvas");
        canvas.width = 250;
        canvas.height = 50;
        var ctx = canvas.getContext("2d");

        ctx.textBaseline = "top";
        ctx.font = "14px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Arial, sans-serif";
        ctx.fillStyle = "rgba(0, 113, 227, 0.2)";
        ctx.fillRect(125, 1, 62, 20);
        ctx.fillStyle = "rgba(29, 29, 31, 0.8)";
        ctx.fillText("HybridGuard 2026", 2, 15);
        ctx.fillStyle = "rgba(52, 199, 89, 0.5)";
        ctx.fillText("HybridGuard 2026", 4, 17);
        ctx.font = "20px -apple-system";
        ctx.fillText("HG", 180, 10);

        canvasBox.style.display = "block";
        canvasBox.appendChild(canvas);

        var dataURL = canvas.toDataURL();
        if (window.AndroidBridge && window.AndroidBridge.sha256) {
            return window.AndroidBridge.sha256(dataURL);
        }
        return String(dataURL.length);
    }

    function buildWebViewData(hostData, bridgeLatencyMs) {
        return {
            bridge_routing_layer: {
                jsbridge_injected: true,
                bridge_latency_ms: bridgeLatencyMs
            },
            kernel_container_layer: {
                webview_provider_package: hostData.webview_provider_package,
                webview_provider_version: hostData.webview_provider_version,
                webview_provider_version_code: hostData.webview_provider_version_code,
                webview_provider_major: hostData.webview_provider_major,
                system_http_agent: hostData.system_http_agent,
                default_ua_native: hostData.default_ua_native
            },
            host_security_layer: {
                is_debuggable: hostData.is_debuggable,
                app_package_name: hostData.app_package_name,
                app_version_name: hostData.app_version_name,
                app_version_code: hostData.app_version_code,
                installer_package: hostData.installer_package,
                is_cleartext_traffic_permitted: hostData.is_cleartext_traffic_permitted
            },
            temporal_build_layer: {
                first_install_time: hostData.first_install_time,
                last_update_time: hostData.last_update_time,
                target_sdk_version: hostData.target_sdk_version,
                min_sdk_version: hostData.min_sdk_version
            },
            webview_settings_layer: {
                java_script_enabled: hostData.java_script_enabled,
                dom_storage_enabled: hostData.dom_storage_enabled,
                database_enabled: hostData.database_enabled,
                allow_file_access: hostData.allow_file_access,
                allow_content_access: hostData.allow_content_access,
                mixed_content_mode: hostData.mixed_content_mode,
                safe_browsing_enabled: hostData.safe_browsing_enabled,
                settings_user_agent: hostData.settings_user_agent
            }
        };
    }

    function buildWebData(parts) {
        return {
            navigator_layer: parts.navigatorInfo,
            screen_layer: parts.screenInfo,
            graphics_layer: {
                webgl_vendor: parts.webglInfo.vendor,
                webgl_renderer: parts.webglInfo.renderer,
                webgl_extensions_count: parts.webglInfo.webgl_extensions_count,
                webgl2_supported: parts.webglInfo.webgl2_supported,
                webgl_max_texture_size: parts.webglInfo.max_texture_size,
                webgl_max_viewport_dims: parts.webglInfo.max_viewport_dims,
                webgl_aliased_line_width_range: parts.webglInfo.aliased_line_width_range,
                canvas_hash: parts.canvasHash
            },
            execution_layer: parts.executionInfo,
            network_api_layer: parts.connectionInfo,
            audio_layer: parts.audioInfo,
            font_layer: parts.fontInfo,
            permissions_layer: parts.permissionsInfo,
            automation_surface_layer: parts.automationInfo
        };
    }

    function collectExpandedSignals() {
        var currentSessionId = "";
        var bridgeLatencyMs = -1;
        var webviewDataNested = buildWebViewData(defaultHostData(), bridgeLatencyMs);
        var webDataNested = buildWebData({
            navigatorInfo: defaultNavigatorFeatures(),
            screenInfo: defaultScreenFeatures(),
            webglInfo: defaultWebGLInfo(),
            executionInfo: defaultExecutionFeatures(),
            connectionInfo: defaultConnectionFeatures(),
            audioInfo: defaultAudioFeatures(),
            fontInfo: defaultFontFeatures(),
            permissionsInfo: defaultPermissionsFeatures(),
            automationInfo: defaultAutomationFeatures(),
            canvasHash: ""
        });

        function handoffPayload() {
            if (!window.AndroidBridge ||
                !window.AndroidBridge.submitExpandedPayload ||
                !currentSessionId) {
                setStatus("Unable to hand payload to Android uploader");
                return;
            }
            var payload = {
                session_id: currentSessionId,
                timestamp: Math.floor(Date.now() / 1000),
                webview_data: webviewDataNested,
                web_data: webDataNested,
                collection_diagnostics: {
                    diagnostics_schema_version: "web-probe-diagnostics-v1",
                    probe_statuses: probeStatuses
                }
            };
            try {
                setStatus("Handing expanded payload to Android uploader...");
                window.AndroidBridge.submitExpandedPayload(JSON.stringify(payload));
                log("Expanded payload handed to uploader", "good");
            } catch (error) {
                log("Android uploader handoff failed: " + describeError(error), "bad");
                setStatus("Android uploader handoff failed");
            }
        }

        setStatus("Establishing JSBridge connection...");
        return sleep(100).then(function () {
            if (!window.AndroidBridge ||
                !window.AndroidBridge.getSessionId ||
                !window.AndroidBridge.submitExpandedPayload) {
                probeStatuses.jsbridge = "runtime_error";
                throw new Error("Android bridge missing");
            }
            var t0 = performance.now();
            currentSessionId = window.AndroidBridge.getSessionId();
            var t1 = performance.now();
            bridgeLatencyMs = parseFloat((t1 - t0).toFixed(3));
            probeStatuses.jsbridge = "observed";
            log("JSBridge connected in " + bridgeLatencyMs + " ms", "good");

            var hostData = safeSyncProbe("WebView host", function () {
                if (!window.AndroidBridge.getWebViewHostFeatures) {
                    throw new Error("WebView host bridge missing");
                }
                return assignObject(
                    defaultHostData(),
                    JSON.parse(window.AndroidBridge.getWebViewHostFeatures())
                );
            }, defaultHostData);
            webviewDataNested = buildWebViewData(hostData, bridgeLatencyMs);
            log("Expanded WebView host signals collected");
            setStatus("Collecting expanded browser runtime signals...");
            return sleep(100);
        }).then(function () {
            var webglInfo = safeSyncProbe("WebGL", getWebGLInfo, defaultWebGLInfo);
            var navigatorInfo = safeSyncProbe("Navigator", getNavigatorFeatures, defaultNavigatorFeatures);
            var screenInfo = safeSyncProbe("Screen", getScreenFeatures, defaultScreenFeatures);
            var executionInfo = safeSyncProbe("Execution", getExecutionFeatures, defaultExecutionFeatures);
            var connectionInfo = safeSyncProbe("Connection", getConnectionFeatures, defaultConnectionFeatures);
            var fontInfo = safeSyncProbe("Font", getFontFeatures, defaultFontFeatures);
            var automationInfo = safeSyncProbe("Automation", getAutomationFeatures, defaultAutomationFeatures);
            var canvasHash = safeSyncProbe("Canvas", getCanvasFingerprint, function () { return ""; });
            var audioPromise = safeAsyncProbe("Audio", getAudioFeatures, function () {
                var fallback = defaultAudioFeatures();
                fallback.audio_error = "probe_timeout_or_error";
                return fallback;
            }, 2500);
            var permissionsPromise = safeAsyncProbe(
                "Permissions",
                getPermissionsFeatures,
                defaultPermissionsFeatures,
                1500
            );
            return Promise.all([audioPromise, permissionsPromise]).then(function (asyncValues) {
                var audioInfo = asyncValues[0];
                var permissionsInfo = asyncValues[1];
                webDataNested = buildWebData({
                    navigatorInfo: navigatorInfo,
                    screenInfo: screenInfo,
                    webglInfo: webglInfo,
                    executionInfo: executionInfo,
                    connectionInfo: connectionInfo,
                    audioInfo: audioInfo,
                    fontInfo: fontInfo,
                    permissionsInfo: permissionsInfo,
                    automationInfo: automationInfo,
                    canvasHash: canvasHash
                });
                log("UA: " + navigatorInfo.user_agent.substring(0, 68));
                log("Logical screen: " + screenInfo.screen_resolution_logical + " DPR " + screenInfo.device_pixel_ratio);
                log("WebGL renderer: " + webglInfo.renderer);
                log("Audio supported: " + audioInfo.audio_context_supported + ", fonts: " + fontInfo.font_probe_count);
                log("Compute challenge: " + executionInfo.compute_task_time_ms + " ms", "good");
                log("Canvas hash: " + canvasHash.substring(0, 16));
            });
        }).then(function () {
            handoffPayload();
        }, function (error) {
            log("Expanded probe degraded: " + describeError(error), "bad");
            handoffPayload();
        });
    }

    window.onload = collectExpandedSignals;
</script>
</body>
</html>
