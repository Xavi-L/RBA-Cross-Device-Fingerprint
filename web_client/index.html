<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HybridGuard RBA 跨端风控探针</title>
    <style>
        :root {
            --primary-color: #00ffcc;
            --bg-color: #050b14;
            --panel-bg: rgba(0, 30, 60, 0.6);
            --border-color: rgba(0, 255, 204, 0.3);
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        /* 顶部标题栏 */
        .header {
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .radar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            position: relative;
            margin-right: 15px;
            overflow: hidden;
            box-shadow: 0 0 10px var(--primary-color);
        }

        .radar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: conic-gradient(from 0deg, transparent 70%, var(--primary-color) 100%);
            transform-origin: 0 0;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            100% { transform: rotate(360deg); }
        }

        h2 {
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--primary-color);
        }

        /* 核心信息面板 */
        .status-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0, 255, 204, 0.1);
        }

        .status-text {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Canvas 指纹展示区 */
        .canvas-container {
            margin-top: 15px;
            padding: 10px;
            border: 1px dashed var(--border-color);
            background: #000;
            display: inline-block;
        }

        /* 极客终端输出框 */
        .terminal {
            background: #000;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--primary-color);
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            font-size: 0.85rem;
            line-height: 1.6;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .terminal p {
            margin: 0;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .terminal p::before {
            content: "> ";
            color: #fff;
        }

        .highlight { color: #ffeb3b; }
        .success { color: #00ffcc; text-shadow: 0 0 5px #00ffcc; }
        .danger { color: #ff3366; text-shadow: 0 0 5px #ff3366; }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="radar"></div>
        <div>
            <h2>HybridGuard RBA Engine</h2>
            <div style="font-size: 0.7rem; color: #888; margin-top: 5px;">CROSS-DEVICE FINGERPRINT PROBE v2.0</div>
        </div>
    </div>

    <div class="status-panel">
        <div class="status-text" id="main-status">SYSTEM STATUS: INITIALIZING SECURITY PROBE...</div>
        <div class="canvas-container" id="canvas-box" style="display: none;">
            <div style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">[ CANVAS RENDER MATRIX ]</div>
            </div>
    </div>

    <div class="terminal" id="log"></div>

    <script>
        // --- 酷炫的打字机日志输出系统 ---
        const terminal = document.getElementById('log');
        const mainStatus = document.getElementById('main-status');

        function updateStatus(msg) {
            mainStatus.innerHTML = `SYSTEM STATUS: <span class="highlight">${msg}</span>`;
        }

        function logMsg(msg, type = 'normal') {
            const p = document.createElement('p');
            if (type === 'success') p.className = 'success';
            else if (type === 'danger') p.className = 'danger';
            
            // 提取关键数据高亮
            let formattedMsg = msg.replace(/(\d+(\.\d+)?\s*(ms|GB)?)/g, '<span class="highlight">$1</span>');
            p.innerHTML = formattedMsg;
            
            terminal.appendChild(p);
            // 自动滚动到底部
            terminal.scrollTop = terminal.scrollHeight;
            console.log(msg);
        }

        // 延迟执行函数，制造正在“深度扫描”的紧张感
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        // 1. 获取 WebGL 底层显卡信息
        function getWebGLInfo() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            let vendor = "Unknown";
            let renderer = "Unknown";
            if (gl) {
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (debugInfo) {
                    vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                    renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                }
            }
            return { vendor, renderer };
        }

        // 2. 获取 Web 端高级环境特征
        function getAdvancedWebFeatures() {
            const features = {};
            try {
                features.color_depth = screen.colorDepth || 0;
                features.pixel_depth = screen.pixelDepth || 0;
                features.avail_width = screen.availWidth || 0;
                features.avail_height = screen.availHeight || 0;
                features.hardware_concurrency = navigator.hardwareConcurrency || 0; 
                features.device_memory = navigator.deviceMemory || 0; 
                features.max_touch_points = navigator.maxTouchPoints || 0; 
                features.language = navigator.language || "";
                features.platform = navigator.platform || "";
                features.timezone_offset = new Date().getTimezoneOffset();
                
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const extensions = gl.getSupportedExtensions();
                    features.webgl_extensions_count = extensions ? extensions.length : 0; 
                }
            } catch (e) { console.error(e); }
            return features;
        }

        // 3. 执行计算挑战
        function runComputeChallenge() {
            const startTime = performance.now();
            let result = 0;
            for (let i = 0; i < 5000000; i++) {
                result += Math.sin(i) * Math.cos(i) + Math.tan(i % 100);
            }
            return { time_ms: parseFloat((performance.now() - startTime).toFixed(2)) };
        }

        // 4. 生成 Canvas 指纹并直观展示
        async function getCanvasFingerprint() {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                canvas.width = 250; canvas.height = 50;
                const ctx = canvas.getContext('2d');

                ctx.textBaseline = "top";
                ctx.font = "14px 'Arial', 'Helvetica', 'sans-serif'";
                ctx.fillStyle = "#f60";
                ctx.fillRect(125, 1, 62, 20);

                ctx.fillStyle = "#069";
                ctx.fillText("HybridGuard 2026", 2, 15);
                ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
                ctx.fillText("HybridGuard 2026", 4, 17);

                ctx.font = "20px Arial";
                ctx.fillText("👾🤖", 180, 10);

                // 将 Canvas 展示到前端大屏上
                document.getElementById('canvas-box').style.display = 'block';
                document.getElementById('canvas-box').appendChild(canvas);

                const dataURL = canvas.toDataURL();
                resolve(sha256(dataURL));
            });
        }

        // 5. 核心：收集与发送 (完全嵌套进化版)
        async function collectAndSend() {
            updateStatus("ESTABLISHING JSBRIDGE CONNECTION...");
            await sleep(500);

            // ==========================================
            // 1. 获取并组装 WebView 容器安全特征 (L3)
            // ==========================================
            let currentSessionId = "fallback-web-" + Date.now();
            let jsbridge_injected = false;
            let bridge_latency_ms = 0.0;
            let securityData = {};

            if (window.AndroidBridge && window.AndroidBridge.getSessionId) {
                jsbridge_injected = true;
                try {
                    const t0 = performance.now();
                    currentSessionId = window.AndroidBridge.getSessionId();
                    const t1 = performance.now();
                    bridge_latency_ms = parseFloat((t1 - t0).toFixed(3));
                    logMsg(`[JSBridge] 连接建立成功，链路延迟: ${bridge_latency_ms} ms`, 'success');

                    if (window.AndroidBridge.getWebViewSecurityFeatures) {
                        securityData = JSON.parse(window.AndroidBridge.getWebViewSecurityFeatures());
                        logMsg("[Container] 已提取沙箱级环境特征矩阵 (20+ Vectors)");
                    }
                } catch (e) { logMsg("[JSBridge] 异常拦截!", "danger"); }
            } else {
                logMsg("[Warning] 纯净 Web 环境，未检测到注入沙箱", "danger");
            }

            // 组装 WebView 嵌套结构
            const webviewDataNested = {
                bridge_routing_layer: {
                    jsbridge_injected: jsbridge_injected,
                    bridge_latency_ms: bridge_latency_ms
                },
                kernel_container_layer: {
                    webview_provider_package: securityData.webview_provider_package,
                    webview_provider_version: securityData.webview_provider_version,
                    webview_provider_version_code: securityData.webview_provider_version_code,
                    system_http_agent: securityData.system_http_agent || securityData.default_ua_native
                },
                host_security_layer: {
                    is_debuggable: securityData.is_debuggable,
                    app_package_name: securityData.app_package_name,
                    installer_package: securityData.installer_package,
                    is_cleartext_traffic_permitted: securityData.is_cleartext_traffic_permitted
                },
                temporal_build_layer: {
                    first_install_time: securityData.first_install_time,
                    last_update_time: securityData.last_update_time,
                    target_sdk_version: securityData.target_sdk_version,
                    min_sdk_version: securityData.min_sdk_version
                }
            };
            if (securityData.error_msg) {
                webviewDataNested.exception_layer = { error_msg: securityData.error_msg };
            }

            // ==========================================
            // 2. 获取并组装 Web 前端渲染与算力特征 (L4)
            // ==========================================
            updateStatus("EXTRACTING BROWSER FINGERPRINTS...");
            await sleep(600);
            
            logMsg(`[Navigator] User-Agent: ${navigator.userAgent.substring(0, 40)}...`);
            logMsg(`[Screen] 逻辑分辨率: ${window.screen.width}x${window.screen.height} DPR: ${window.devicePixelRatio||1}`);
            
            const webglInfo = getWebGLInfo();
            logMsg(`[GPU] WebGL 渲染引擎探测: ${webglInfo.renderer}`);

            updateStatus("RUNNING CRYPTO & COMPUTE TASKS...");
            await sleep(500);

            const challenge = runComputeChallenge();
            logMsg(`[Compute] CPU 算力挑战完成，耗时: ${challenge.time_ms} ms`, 'success');

            const canvasHash = await getCanvasFingerprint();
            logMsg(`[Render] Canvas 像素级哈希生成: ${canvasHash.substring(0, 16)}...`, 'success');

            // ⚠️ 修复点：确保在拼装 JSON 前，提前呼叫并声明探针变量
            const advancedFeatures = getAdvancedWebFeatures();
            logMsg(`[Metrics] 已提取前端扩展特征群 (40+ Vectors)`);

            // 组装 Web 嵌套结构
            const webDataNested = {
                navigator_layer: {
                    user_agent: navigator.userAgent,
                    language: advancedFeatures.language,
                    platform: advancedFeatures.platform,
                    hardware_concurrency: advancedFeatures.hardware_concurrency,
                    device_memory: advancedFeatures.device_memory,
                    max_touch_points: advancedFeatures.max_touch_points
                },
                screen_layer: {
                    screen_resolution_logical: `${window.screen.width}x${window.screen.height}`,
                    device_pixel_ratio: window.devicePixelRatio || 1,
                    color_depth: advancedFeatures.color_depth,
                    pixel_depth: advancedFeatures.pixel_depth,
                    avail_width: advancedFeatures.avail_width,
                    avail_height: advancedFeatures.avail_height
                },
                graphics_layer: {
                    webgl_vendor: webglInfo.vendor,
                    webgl_renderer: webglInfo.renderer,
                    webgl_extensions_count: advancedFeatures.webgl_extensions_count,
                    canvas_hash: canvasHash
                },
                execution_layer: {
                    compute_task_time_ms: challenge.time_ms,
                    timezone_offset: advancedFeatures.timezone_offset
                }
            };

            // ==========================================
            // 3. 终极组装与发送
            // ==========================================
            const payload = {
                session_id: currentSessionId, 
                timestamp: Math.floor(Date.now() / 1000),
                webview_data: webviewDataNested, 
                web_data: webDataNested
            };

            updateStatus("UPLOADING TO RBA ENGINE...");
            logMsg("========================================");
            logMsg(" 准备跨端数据会师，向 FastAPI 传输负载包...");

            try {
                const response = await fetch('http://10.0.2.2:8000/api/collect/fingerprint', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    logMsg(" [HTTP 200] 传输成功！大模型风控分析已就绪。", "success");
                    updateStatus("SCAN COMPLETE. AWAITING AI DECISION.");
                } else {
                    logMsg(` [HTTP ${response.status}] 传输失败`, "danger");
                }
            } catch (error) {
                logMsg(" 探针离线，请检查后端网络环境", "danger");
            }
        }

        // 启动！
        window.onload = collectAndSend;
    </script>
</body>
</html>
